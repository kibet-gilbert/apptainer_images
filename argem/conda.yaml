name: mgs2amr
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  # Core language and dependencies
  - python>=3.8
  - luigi>=3.0
  - pandas>=0.25
  - numpy>=1.17
  - pymysql>=0.9
  - xlrd>=1.2
  - sqlite>=3            # for SRA-toolkit compatibility
  - diamond>=0.9.12
  - blast>=2.9           # ensures blastn availability
  #͏ Optional utilities that ARGem might invoke
  - sra-tools            # NCBI SRA Toolkit
  - git
